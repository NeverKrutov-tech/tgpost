name: TG AutoPost

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore DB from cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: data/jokes.db
          key: jokes-db-v1
          restore-keys: |
            jokes-db-v1-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Create .env from secrets
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
          echo "CHANNEL_ID=${{ secrets.CHANNEL_ID }}" >> .env
          echo "ADMIN_ID=${{ secrets.ADMIN_ID }}" >> .env
          echo "CHANNEL_LINK=${{ secrets.CHANNEL_LINK }}" >> .env
          echo "TELEGRAM_SOURCES=${{ secrets.TELEGRAM_SOURCES }}" >> .env
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "YOUTUBE_CHANNEL_ID=${{ secrets.YOUTUBE_CHANNEL_ID }}" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}" >> .env
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "TELETHON_API_ID=${{ secrets.TELETHON_API_ID }}" >> .env
          echo "TELETHON_API_HASH=${{ secrets.TELETHON_API_HASH }}" >> .env
          echo "TELETHON_SESSION_STRING=${{ secrets.TELETHON_SESSION_STRING }}" >> .env

      - name: Ingest jokes
        run: python -m src.tg_autopost ingest
        env:
          FETCH_LIMIT: 300

      - name: Seed shorts candidate
        run: python scripts/seed_shorts.py

      - name: Read Friday prompt marker
        run: |
          if [ -f data/friday_marker.txt ]; then
            echo "FRIDAY_MARKER=$(cat data/friday_marker.txt)" >> $GITHUB_ENV
          fi

      - name: Read Sunday digest marker
        run: |
          if [ -f data/sunday_digest_marker.txt ]; then
            echo "SUNDAY_DIGEST_MARKER=$(cat data/sunday_digest_marker.txt)" >> $GITHUB_ENV
          fi

      - name: Set Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish joke
        continue-on-error: true
        run: python -m src.tg_autopost publish

      - name: Save DB to cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: data/jokes.db
          key: jokes-db-v1-${{ github.run_id }}

      - name: Commit Friday prompt marker
        if: always()
        continue-on-error: true
        run: |
          [ -f data/friday_marker.txt ] && git add data/friday_marker.txt
          [ -f data/sunday_digest_marker.txt ] && git add data/sunday_digest_marker.txt
          [ -f data/published_keys.txt ] && git add data/published_keys.txt
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "chore: update markers [skip ci]"
            git push
          fi
