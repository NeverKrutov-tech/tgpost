services:
  - type: web
    name: tgpost-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.tg_autopost.render_web
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: CHANNEL_LINK
        sync: false
      - key: ADMIN_ID
        sync: false

