services:
  - type: worker
    name: tgpost-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.tg_autopost bot
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: CHANNEL_LINK
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tgpost-db
          property: connectionString

databases:
  - name: tgpost-db
    plan: free
