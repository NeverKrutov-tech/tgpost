        - link [ref=f2e14] [cursor=pointer]:
          - /url: /724
        - 'link "Передача на радио. Позвонившим предлагают назвать слово, которого нет в словаре, но которое в предложении может иметь смысл. Итак, звонок. Ведущий: здраствуйте, вы кто? — Я Дэйв. — Ваше слово? — Шолб. По буквам: Ш-О-Л-Б. — Такого слова в словаре нет. У вас все шансы выиграть путевку. Теперь скажите осмысленное предлложение с этим словом. — Шолб ты на хуй! Телефонный звонок моментально обрывают. Далее передача продолжается, проходит несколько неудачных разговоров со звонящими. И вот очередной звонок. Ведущий: Алло. Как вас зовут? — Джефф. — Ваше слово? — Эцново. Э-Ц-Н-О-В-О. — Да, странное слово, в словаре нет. А предложение целиком? — Эцново я. Шолб ты на хуй!!!" [ref=f2e15] [cursor=pointer]':
          - /url: /666
        - link [ref=f2e16] [cursor=pointer]:
          - /url: /689
        - link "— Скажите, а это ваш \"Ягуар\" стоит около выхода? — Да. — Я допью?" [ref=f2e17] [cursor=pointer]:
          - /url: /1
        - 'link "Вот двое мужчин едут на поезде в Шотландию и первый говорит второму: «Простите сэр, а что это за странная посылка у вас на полке?». «О, — говорит второй, — это макгаффин». «А что такое макгаффин?» — «Это прибор для ловли львов в Шотландском высокогорье». «Но, — говорит первый, — там нет львов». «А, — говорит второй, — тогда это не макгаффин»." [ref=f2e18] [cursor=pointer]':
          - /url: /776
        - 'link "Волк поймал колобка, крутит его в лапах, вертит: — Куда тебя ебать??? Куда тебя ебать??? — Не надо меня ебать! — ОТКУДА ТЫ ЭТО СКАЗАЛ??!! ОТКУДА ТЫ ЭТО СКАЗАЛ???!!" [ref=f2e19] [cursor=pointer]':
          - /url: /351
        - link [ref=f2e20] [cursor=pointer]:
          - /url: /760
        - 'link "Встречаются русский владелец диснейленда и американский. Решили сравнить у кого страшнее комната страха. Русский заходит в американский там мумии, скелеты всякие, в общем, всё как обычно. Заходит американец в русский: длинный коридор без света, идет, идет американец страшно ему уже, долго идет. Увидел свет. Идет дальше, видит сидит грузин со свечкой. Грузин американца спрашивает: — Ты попу мыл? — Мыл Грузин гасит свечку" [ref=f2e21] [cursor=pointer]':
          - /url: /555
        - 'link "Приехал мужик в ЮАР во времена апартеида. Решил в театр сходить. Пришел в кассу: — Дайте, пожалуйста, билет! — Ты что, первый раз в ЮАР? — Да, а как вы узнали? — Да в кассе у нас только негры билеты берут, а белые у администратора. Мужик к администратору: — Дайте, пожалуйста, билет в партер! — Ты что, первый раз в ЮАР? — Да, а как вы узнали? — В партер у нас только негры берут билеты, а белые в бельэтаж и в ложи. Взял мужик билет в бельэтаж. Сел, смотрит спектакль. Захотелось ему поссать. Он к служителю: — А где тут у вас туалет? — Ты что, первый раз в ЮАР? — Да, а как вы узнали? — Да в туалет у нас ссать только негры ходят, а белые ссут прямо в партер, там ведь одни негры. Встал мужик, начал ссать в партер. Из партера недовольный голос: — Ты что, первый раз в ЮАР? — Да, а как вы узнали? — Так ты чего ж только на меня одного все время ссышь? Ты разбрызгивай, разбрызгивай!" [ref=f2e22] [cursor=pointer]':
          - /url: /960
        - 'link "Перед званым вечером у Наташи Ростовой Ржевский отчитывает гусаров: не материться, не нажираться, дам прилюдно за задницу не хватать и т. п. Видя скованность гусар за ужином, Наташа задает вопрос: «Господа гусары у меня тут есть 29 подсвечников, а я купила тридцать свечей. Куда бы вставить тридцатую?» Поручик Ржевский, вскакивая из-за стола: \"Господа гусары, ни слова о пизде!!\"" [ref=f2e23] [cursor=pointer]':
          - /url: /376
        - link [ref=f2e24] [cursor=pointer]:
          - /url: /971
        - link [ref=f2e25] [cursor=pointer]:
          - /url: /937
        - 'link "Жила–была слепая девочка. Каждый раз за обедом девочка долго ощупывала содержимое тарелки руками и ныла: — Ну вот, как всегда мне меньше всех положили! Раз ничего не вижу — значит и обделить можно! Жмоты… Маме все это надоело и решила она проконсультироваться с психологом. На что доктор дал ей такой совет: — Вы, — говорит, — сварите целый тазик пельменей. На следующий день мама накрывает на стол и ставит перед девочкой целый таз пельменей. Девочка садится за стол, двигает к себе пельмени, долго ощупывает содержимое руками и говорит: — Представляю, сколько вы себе нахерачили…" [ref=f2e26] [cursor=pointer]':
          - /url: /765
        - link [ref=f2e27] [cursor=pointer]:
          - /url: /973
        - link [ref=f2e28] [cursor=pointer]:
          - /url: /747
        - 'link "Рассказывает дед внуку про войну: — Захватили в плен немцы, и говорят: сосите или расстреляем! — Дед, и ты сосал?! — Нет, внучек, меня расстреляли." [ref=f2e29] [cursor=pointer]':
          - /url: /178
        - 'link "Пошел рыбак на рыбалку. На берегу реки поставил палатку, а сам решил немного отдохнуть с дороги. Лежит он и слышит где-то вдадеке крик: - И-иди на хуй!!! Через некоторое время уже ближе: - И-и-иди на хуй!!! Прошло еще немного времени, а тут уже совсем близко тот же самый крик. Решил тогда мужик посмотреть что там такое. Вылез из палатки и видит: по реке, в лодке, плывет другой мужик, а вместо весел у него-ложки. Рыбак тому мужику-то и говорит: - Ты бы еще вилки взял! А ему в ответ: - И-и-и-иди на хуй!!!" [ref=f2e30] [cursor=pointer]':
          - /url: /787
        - link [ref=f2e31] [cursor=pointer]:
          - /url: /1098
        - link [ref=f2e32] [cursor=pointer]:
          - /url: /266
        - 'link "Шел рыцарь по пустыне. Долгим был его путь. По пути он потерял коня, шлем и доспехи. Остался только меч. Рыцарь был голоден, и его мучила жажда. Вдруг вдалеке он увидел озеро. Собрал рыцарь все свои оставшиеся силы и пошел к воде. Но у самого озера сидел трехглавый дракон. Рыцарь выхватил меч и из последних сил начал сражаться с чудовищем. Сутки бился, вторые бился. Две головы дракона уже отрубил. На третьи сутки дракон упал без сил. Рядом упал обессиленный рыцарь, не в силах уже более стоять на ногах и держать меч. И тогда из последних сил дракон спросил: - Рыцарь, а ты чего хотел-то? - Воды попить. - Ну, так и пил бы..." [ref=f2e33] [cursor=pointer]':
          - /url: /253
        - 'link "Она: — Доктор, поцелуйте меня! Доктор: — Я не могу. У нас, докторов, существует своя медицинская этика, которая не позволяет целовать пациентов. А вообще-то, мне и трахать вас не следовало." [ref=f2e34] [cursor=pointer]':
          - /url: /370
        - link "Сидят отец и сын с очень большой головой, молча обедают. Вдруг отец ни с того ни с сего со всей дури отвешивает сыну леща. — За что, батя?! — Ненавижу тебя блядь! Такую пизду испортил!" [ref=f2e35] [cursor=pointer]:
          - /url: /606
        - 'link "Приходит Мойша в партизанский отряд: — Хочу стать пагтизаном. — Так просто это не делается, - отвечает командир, - вот тебе листовки, распространишь - возьмем. Мойша уходит, возвращается через неделю. Командир: — Почему так долго? Мойша (доставая пачку денег): — Сложный товагец вы мне подсунули..." [ref=f2e36] [cursor=pointer]':
          - /url: /649
        - 'link "Лондон. Утро. Старый английский лорд завтракает. Вбегает дворецкий и кричит: - Сэр! Темза вышла из берегов!!! Лорд флегматично: - Джон, выйдите, потом зайдите и доложите как следует. Дворецкий выходит, потом снова вбегает и кричит: - Сэр! Темза уже у нашего дома!!! - Джон, выйдите, потом зайдите и доложите как следует. Дворецкий выходит. Открывается дверь, степенно входит дворецкий, за ним в комнату врываются потоки воды: - Темза, сэр!" [ref=f2e37] [cursor=pointer]':
          - /url: /785
        - link "— Скажите, Сергей, как вы поняли что в квартире находится кто-то чужой? — Ну у нас в семье не принято хуярить меня сзади табуреткой по голове!" [ref=f2e38] [cursor=pointer]:
