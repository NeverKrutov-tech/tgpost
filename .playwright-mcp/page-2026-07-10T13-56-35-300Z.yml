        - 'link "Парень приводит девушку домой, знакомиться. Та заходит в коридор, наклоняется туфли снять и громко пердит, смущается и смотря в потолок говорит: - ой, какая у Вас люстра красивая... Ей парень отвечает: - в зал зайдешь вообще обосрёшься!" [ref=f2e10] [cursor=pointer]':
          - /url: /1064
        - link "Купил мужчина шляпу, а она ему как раз." [ref=f2e11] [cursor=pointer]:
