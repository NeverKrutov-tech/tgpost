        - paragraph [ref=f6e10]: "Сидит бомж возле вокзала побирается. Идет новый русский, видит эту картину, ну у него в сердце что–то скакнуло, он подходит к бомжу, кидает ему 100 баксов и уходит в машину. Не успел он сесть, как подъезжает лимузин и от туда выходит Путин. Владимир Владимирович подходит к бомжу и кричит: — Толян! Привет, как дела? Куда пропал? Давай сегодня поужинаем! Толя ему отвечает: — Не Володя, не могу. Я работаю, давай вечерком. Ну, они договорились, Путин сел в машину и уехал. Новый русский просто в шоке! Вдруг подъезжает второй лимузин, из него выходит Лукашенко и кричит бомжу: — Толя, привет! Как дела? Куда пропал? Давай сегодня поужинаем!? Толя говорит: — Сегодня не могу, я с Путиным договорился, давай завтра? Ну, короче, они договорились. Новый русский тем временем выпал в ноль. Он подходит к бомжу и спрашивает: — Откуда ты знаешь таких людей, ты же бомж? — Я и не таких знаю! — А папу римского ты знаешь? — Ну, знаю. Новый русский подумал и говорит: — Давай так: я оплачиваю нам поездку в Рим, если я увижу, что ты стоишь на балконе с папой римским, то я дам тебе столько денег, что хватит твоим внукам в 13 поколении. Бомж согласился. На следующий день они приехали в Рим, на площади возле Ватикана миллионы людей, они прошли в первые ряды, новый русский остался, а Толя пошел. Он прошел всю охрану, его поприветствовали. Новый русский смотрит на балкон и видит, что Толя садится за стол к папе римскому и кушает с ним. Потом они встали и начали махать пришедшим на площадь людям. Вдруг Толя видит, что новый русский упал в обморок. На следующий день они встретились, и Толя спрашивает: — Почему ты потерял сознание? — Ну, я могу понять — Путин, могу понять — Лукашенко, но когда приехала китайская делегация и спросила у гида: “Кто это в белом рядом с Толиком стоит? ”"
